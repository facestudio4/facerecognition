name: face_studio_mobile_client
description: Minimal mobile client for Face Studio backend API.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  http: ^1.2.2
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  shared_preferences: ^2.3.2
  webview_flutter: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
